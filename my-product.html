<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bumia Vendor - My Products</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <style>
    body {
      background-color: #f8f9fa; /* Bootstrap's bg-light */
      padding-top: 2rem;
      padding-bottom: 3rem;
    }

    #productsContainer {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
      margin-top: 2rem;
    }

    /* Forcing your JS classes to behave like Bootstrap .card */
    .itemContainer {
      background-color: #fff;
      border: 1px solid rgba(0,0,0,.125);
      border-radius: 0.375rem;
      display: flex;
      flex-direction: column;
      box-shadow: 0 0.125rem 0.25rem rgba(0,0,0,.075);
      transition: transform 0.2s ease;
    }

    .itemContainer:hover {
      transform: translateY(-5px);
      box-shadow: 0 0.5rem 1rem rgba(0,0,0,.15);
    }

    /* Fixing your image distortion permanently */
    .itemImage {
      width: 100%;
      height: 220px;
      object-fit: contain;
      padding: 1.5rem;
      border-bottom: 1px solid rgba(0,0,0,.125);
    }

    /* Mimicking Bootstrap .card-title */
    .itemTitle {
      font-size: 1.25rem;
      font-weight: 500;
      margin: 1rem 1rem 0.5rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Mimicking Bootstrap .card-text */
    .itemDesc {
      color: #6c757d;
      font-size: 0.875rem;
      margin: 0 1rem 1rem;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      flex-grow: 1; /* Pushes the price to the bottom */
    }

    /* Mimicking Bootstrap text-success */
    .itemPrice {
      font-size: 1.25rem;
      font-weight: bold;
      color: #198754;
      margin: 0 1rem 1rem;
    }
    
    .itemPrice::before {
      content: "$";
    }
  </style>
</head>
<body>

  <div class="container">
    <header class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
      <h1 class="m-0 text-dark fw-bold">My Products</h1>
      <button type="button" class="btn btn-primary shadow-sm" data-bs-toggle="modal" data-bs-target="#addProductModal">
        + Add New Product
      </button>
    </header>

    <div id="productsContainer"></div>
  </div>

  <div class="modal fade" id="addProductModal" tabindex="-1" aria-labelledby="addProductModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        
        <div class="modal-header bg-light">
          <h5 class="modal-title fw-bold" id="addProductModalLabel">Add New Product</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        
        <div class="modal-body">
          <form id="newProductForm">
            <div class="mb-3">
              <label for="productTitle" class="form-label fw-semibold">Title</label>
              <input type="text" class="form-control" id="productTitle" placeholder="Enter product name" required>
            </div>
            
            <div class="mb-3">
              <label for="productPrice" class="form-label fw-semibold">Price ($)</label>
              <input type="number" step="0.01" class="form-control" id="productPrice" placeholder="0.00" required>
            </div>
            
            <div class="mb-3">
              <label for="productDesc" class="form-label fw-semibold">Description</label>
              <textarea class="form-control" id="productDesc" rows="3" placeholder="Describe your product..." required></textarea>
            </div>
            
            <div class="mb-3">
              <label for="productCategory" class="form-label fw-semibold">Category</label>
              <select class="form-select" id="productCategory" required>
                <option value="" selected disabled>Select a category...</option>
                <option value="electronics">Electronics</option>
                <option value="jewelery">Jewelery</option>
                <option value="mens-clothing">Men's Clothing</option>
                <option value="womens-clothing">Women's Clothing</option>
              </select>
            </div>
            
            <div class="mb-3">
              <label for="productImage" class="form-label fw-semibold">Image URL</label>
              <input type="url" class="form-control" id="productImage" placeholder="https://example.com/image.jpg" required>
            </div>
          </form>
        </div>
        
        <div class="modal-footer bg-light">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" form="newProductForm" class="btn btn-primary">Save Product</button>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="add-product.js"></script>
  <script src="my-product.js"></script>
</body>
</html>
