<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account UI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <div class="left-panel">
    <h1>Create an account</h1>
    <p class="subtitle">Join us to start your journey.</p>
    
    <button class="google-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      LOG IN WITH GOOGLE
    </button>

    <div class="divider"><span>OR</span></div>

    <form id="regForm">
      <div class="form-group">
        <label>FULL NAME</label>
        <input type="text" id="regFullname" placeholder="Enter your full name">
        <span id="fullnameError" class="error-text"></span>
      </div>

      <div class="form-group">
        <label>EMAIL ADDRESS</label>
        <input type="email" id="regEmail" placeholder="Enter your email">
        <span id="emailError" class="error-text"></span>
      </div>

      <div class="form-group">
        <label>PHONE NUMBER</label>
        <input type="text" id="regPhoneNumber" placeholder="Enter your phone number">
        <span id="phoneNumberError" class="error-text"></span>
      </div>

      <div class="form-group">
        <label>BUSINESS NAME</label>
        <input type="text" id="regBusinessName" placeholder="Enter your business name">
        <span id="businessNameError" class="error-text"></span>
      </div>

      <div class="form-group">
        <label>PASSWORD</label>
        <input type="password" id="regPassword" placeholder="Create a password">
        <svg class="eye-icon" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path></svg>
        <span id="passwordError" class="error-text"></span>
      </div>

      <div class="checkbox-group">
        <input type="checkbox" id="terms">
        <label for="terms">I agree to Terms & Privacy Policy</label>
      </div>

      <button type="submit" class="submit-btn" id="registerButton">REGISTER</button>
      
      <div id="registerStatus" style="color: #d93025; margin-top: 15px; text-align: center; font-weight: 600; font-size: 0.9rem;"></div>
    </form>
  </div>

  <div class="right-panel">
    <div class="badges">
      <div class="badge">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/></svg>
        SECURE CHECKOUT
      </div>
      <div class="badge">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20 8h-3V4H3v13h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4zM8 18c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm10 0c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-8.5-6V6h5v6H9.5z"/></svg>
        FREE SHIPPING
      </div>
    </div>
    
    <div class="promo-text">
      <h2>ELEVATE YOUR<br>EVERYDAY.<br>DESIGNED IN<br>LAGOS.</h2>
      <p>Join the 44:11 Club for exclusive access to new drops and community events.</p>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
